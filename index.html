<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YUYU - AI Video Canvas</title>
    <link rel="icon" href="./public/assets/yuyu-favicon.png" type="image/png" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="YUYU canvas">
      <img class="pixel-underlay" id="pixelUnderlay" src="./public/assets/yuyu-captured-state.png" alt="" aria-hidden="true" width="1920" height="863" />

      <div class="canvas-bg" id="canvasBg">
        <svg class="connector-layer" viewBox="0 0 1920 863" aria-hidden="true">
          <path id="pathCharacter" />
          <path id="pathLocation" />
        </svg>

        <section class="node snapshot-node" data-node="character" style="--x: 508px; --y: 52px">
          <img class="node-snapshot" src="./public/assets/node-character-snapshot.png" alt="1779931305633_e652q06h_image_imag character reference" width="289" height="450" />
        </section>

        <section class="node snapshot-node" data-node="location" style="--x: 397px; --y: 538px">
          <img class="node-snapshot" src="./public/assets/node-location-snapshot.png" alt="位置参考图" width="509" height="305" />
        </section>

        <section class="node snapshot-node" data-node="video" style="--x: 1018px; --y: 333px">
          <img class="node-snapshot" src="./public/assets/node-video-snapshot.png" alt="视频 生成内容违规" width="506" height="303" />
        </section>
      </div>

      <header class="topbar">
        <div class="brand">
          <img class="brand-logo" src="./public/assets/yuyu-logo.png" alt="" aria-hidden="true" width="36" height="36" />
          <strong>YUYU</strong>
        </div>
        <div class="mode-switch" role="tablist" aria-label="mode switch">
          <button class="active" data-mode="canvas" role="tab" aria-selected="true">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2 3.3h12v9.4H2zM4 10l2.4-2.5 1.8 1.7 1.2-1.2L12 10.8"/></svg>
            <span>画布</span>
          </button>
          <button data-mode="editor" role="tab" aria-selected="false">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2.5 2.5h4.6v4.6H2.5zM8.9 2.5h4.6v4.6H8.9zM2.5 8.9h4.6v4.6H2.5zM8.9 8.9h4.6v4.6H8.9z"/></svg>
            <span>编辑器</span>
          </button>
        </div>
        <div class="account-pill">
          <span class="diamond">✦</span>
          <strong>5980</strong>
          <i></i>
          <span>标准会员</span>
        </div>
      </header>

      <aside class="tool-rail" aria-label="tools">
        <button class="tool-add" data-action="add" title="Add"><span>+</span></button>
        <button data-action="folder" title="Folder"><svg viewBox="0 0 20 20"><path d="M2.5 6.2h5l1.4 1.7h8.6v7.2a1.5 1.5 0 0 1-1.5 1.5H4a1.5 1.5 0 0 1-1.5-1.5zM2.5 5.6V4.9A1.5 1.5 0 0 1 4 3.4h3.2L9 5.6"/></svg></button>
        <button data-action="actor" title="Actor"><svg viewBox="0 0 20 20"><path d="M10 11.2a3.3 3.3 0 1 0 0-6.6 3.3 3.3 0 0 0 0 6.6ZM4.2 17a5.8 5.8 0 0 1 11.6 0M14.7 4.6l1.9-1.9M16.5 8h2.3M14.7 11.4l1.9 1.9"/></svg></button>
        <button data-action="prompt" title="Prompt"><svg viewBox="0 0 20 20"><path d="M6.7 3.5h8.1a1.6 1.6 0 0 1 1.6 1.6v9.8a1.6 1.6 0 0 1-1.6 1.6H5.2a1.6 1.6 0 0 1-1.6-1.6V7.1zM6.7 3.5v3.6H3.6M7.4 9.2h5.7M7.4 12.1h4.2"/></svg></button>
      </aside>

      <section class="minimap" aria-label="minimap">
        <div class="mini-frame">
          <span class="mini portrait"></span>
          <span class="mini sketch"></span>
          <span class="mini video"></span>
        </div>
        <button id="autoLayout">自动布局</button>
      </section>

      <nav class="bottom-controls" aria-label="canvas controls">
        <button data-action="view" title="View"><svg viewBox="0 0 20 20"><path d="M4.5 3.5h4.2v13H4.5zM11.3 3.5h4.2v5h-4.2zM11.3 11.5h4.2v5h-4.2z"/></svg></button>
        <button class="active" data-action="map" title="Map"><svg viewBox="0 0 20 20"><path d="M3.5 5.2 7.8 3l4.4 2.2 4.3-2.2v11.8L12.2 17l-4.4-2.2-4.3 2.2zM7.8 3v11.8M12.2 5.2V17"/></svg></button>
        <button data-action="hand" title="Hand"><svg viewBox="0 0 20 20"><path d="M6.4 9.1V4.6a1.1 1.1 0 1 1 2.2 0v4M8.6 8V3.8a1.1 1.1 0 1 1 2.2 0V8M10.8 8.5V4.6a1.1 1.1 0 1 1 2.2 0v5M13 9.6V7.4a1.1 1.1 0 1 1 2.2 0v4.5c0 3.2-2 5-5.1 5H9c-2.2 0-3.6-1.3-4.6-3.4L3.2 11a1.1 1.1 0 0 1 1.9-1l1.2 1.8"/></svg></button>
        <button data-action="grid" title="Grid"><svg viewBox="0 0 20 20"><path d="M4 4h4v4H4zM12 4h4v4h-4zM4 12h4v4H4zM12 12h4v4h-4z"/></svg></button>
        <span class="divider"></span>
        <button id="zoomOut" title="Zoom out">−</button>
        <button id="zoomValue" class="zoom-value">78%</button>
        <button id="zoomIn" title="Zoom in">+</button>
      </nav>

      <button class="keyboard-btn" data-action="keyboard" title="Keyboard">
        <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M3 5h14v10H3zM5 8h1M8 8h1M11 8h1M14 8h1M5 11h6M13 11h2"/></svg>
      </button>

      <button class="assistant-btn" data-action="assistant" title="Assistant">
        <span>☆</span><small>A</small>
      </button>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </main>
    <script src="./src/app.js"></script>
  </body>
</html>
