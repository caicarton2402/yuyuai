<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YUYU - AI Explore</title>
    <link rel="icon" href="./public/assets/yuyu-favicon.png" type="image/png" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="explore-shell" aria-label="YUYU AI explore">
      <div class="ambient-bg" aria-hidden="true"></div>

      <aside class="side-nav" aria-label="YUYU navigation">
        <a class="mini-brand" href="./index.html" aria-label="YUYU home">
          <img src="./public/assets/yuyu-logo.png" alt="" width="28" height="34" />
        </a>
        <nav class="nav-stack" aria-label="primary">
          <button class="active" type="button" title="首页" data-nav="home">
            <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M3.5 9.2 10 4l6.5 5.2v7.1H12v-4.6H8v4.6H3.5z" /></svg>
          </button>
          <button type="button" title="项目" data-nav="projects">
            <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M2.8 6.2h5l1.5 1.6h7.9v7.1a1.5 1.5 0 0 1-1.5 1.5H4.3a1.5 1.5 0 0 1-1.5-1.5zM2.8 5.7v-.8a1.5 1.5 0 0 1 1.5-1.5h3.2l1.8 2.3" /></svg>
          </button>
          <button type="button" title="灵感" data-nav="ideas">
            <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M10.3 3.4a6.1 6.1 0 0 0-3 11.4v1.7h5.4v-1.7A6.1 6.1 0 0 0 10.3 3.4ZM8.2 18h3.6M13.8 4.3l1.8-1.8M16.1 8h2.2M14.8 12.2l1.8 1.8" /></svg>
          </button>
          <button type="button" title="团队" data-nav="team">
            <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M8.3 10.2a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM3.4 17a4.9 4.9 0 0 1 9.8 0M14.2 6.4a2.4 2.4 0 0 1 0 4.8M14.8 13.1a4.1 4.1 0 0 1 2.8 3.9" /></svg>
          </button>
        </nav>
        <div class="account-stack">
          <div class="mascot">YUYU</div>
          <div class="credit-pill"><strong>5083</strong><span>标准会员</span></div>
          <button class="avatar-btn" type="button" title="账户"></button>
          <button type="button" title="通知"><svg viewBox="0 0 20 20"><path d="M6 15.4h8M7.1 8.4a3 3 0 0 1 6 0c0 4 1.6 4.7 1.6 6H5.5c0-1.3 1.6-2 1.6-6ZM8.7 17a1.5 1.5 0 0 0 2.6 0" /></svg></button>
          <button type="button" title="更多"><svg viewBox="0 0 20 20"><path d="M5 6h10M5 10h10M5 14h10" /></svg></button>
        </div>
      </aside>

      <button class="float-translator" type="button" data-action="translator" title="语言助手">
        <span>译</span>
      </button>

      <section class="hero" aria-labelledby="heroTitle">
        <h1 id="heroTitle">有什么新的故事灵感?</h1>

        <section class="prompt-box" aria-label="story prompt composer">
          <div class="prompt-textline">
            <button class="prompt-prefix" type="button" id="promptPrefix">短剧漫剧 /</button>
            <textarea id="promptInput" rows="2" placeholder="输入你的灵感，AI 会为你自动策划内容生成视频"></textarea>
          </div>

          <div class="prompt-controls">
            <div class="tool-cluster" role="toolbar" aria-label="prompt tools">
              <button type="button" data-tool="upload" aria-pressed="false" title="上传素材">
                <svg viewBox="0 0 20 20" aria-hidden="true"><path d="m7.2 10.8 4.9-4.9a2.1 2.1 0 0 1 3 3l-6.4 6.4a3.4 3.4 0 0 1-4.8-4.8l6.8-6.8" /></svg>
              </button>
              <button type="button" data-tool="asset" aria-pressed="false" title="角色和场景资产">
                <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M10 2.8 16 6v7.2l-6 4-6-4V6zM4 6l6 3.4L16 6M10 9.4v7.8" /></svg>
              </button>
              <button type="button" data-tool="mention" aria-pressed="false" title="引用角色">
                <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M13.4 8.7v2a3.4 3.4 0 1 1-1.2-2.6v3.2a2.1 2.1 0 0 0 4.2 0V10a6.4 6.4 0 1 0-2.3 4.9" /></svg>
              </button>
              <button type="button" data-tool="style" aria-pressed="false" title="风格控制">
                <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M10 3.2a6.8 6.8 0 0 0 0 13.6h.7a1.5 1.5 0 0 0 .8-2.8 1.1 1.1 0 0 1 .7-2h1.2a3.4 3.4 0 0 0 0-6.8zM6.8 9.2h.1M9 6.8h.1M12.2 7.2h.1M5.9 12.2H6" /></svg>
              </button>
            </div>

            <button class="model-pill" type="button" data-action="model">
              Seedance2.0 全能模式 <small>NEW</small>
            </button>

            <label class="series-switch">
              <span>多剧集</span>
              <input type="checkbox" id="seriesToggle" />
              <i aria-hidden="true"></i>
            </label>

            <button class="send-btn" id="sendBtn" type="button" title="开始生成">
              <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M10 16V4M5.8 8.2 10 4l4.2 4.2" /></svg>
            </button>
          </div>

          <div class="tool-panel" id="toolPanel" hidden></div>
        </section>

        <nav class="category-tabs" aria-label="creation categories">
          <button class="active" type="button" data-category="overseas"><span class="tab-icon lime">▣</span>出海短剧</button>
          <button type="button" data-category="comic"><span class="tab-icon pink">♫</span>短剧漫剧</button>
          <button type="button" data-category="mv"><span class="tab-icon purple">♪</span>音乐MV <small>Beta</small></button>
          <button type="button" data-category="knowledge"><span class="tab-icon cyan">▤</span>知识分享</button>
        </nav>

        <div class="template-grid" id="templateGrid" aria-label="prompt templates"></div>
      </section>

      <section class="feature-section" aria-labelledby="featureTitle">
        <h2 id="featureTitle">特色功能</h2>
        <div class="feature-row">
          <button class="feature-card blank" type="button" data-feature="blank">
            <span class="plus">+</span>
            <strong>空白画布</strong>
          </button>
          <button class="feature-card image-card" type="button" data-feature="effects">
            <img src="./public/assets/explore/feature-effects.png" alt="" />
            <em>New</em>
            <strong>特效模板</strong>
          </button>
          <button class="feature-card image-card" type="button" data-feature="seedance">
            <img src="./public/assets/explore/feature-seedance.png" alt="" />
            <em>New</em>
            <strong>Seedance2.0 视频生成</strong>
          </button>
          <button class="feature-card image-card" type="button" data-feature="grid">
            <img src="./public/assets/explore/feature-grid.png" alt="" />
            <em>New</em>
            <strong>九宫格图</strong>
          </button>
          <button class="feature-card image-card" type="button" data-feature="panorama">
            <img src="./public/assets/explore/feature-panorama.png" alt="" />
            <em>New</em>
            <strong>720°全景图</strong>
          </button>
        </div>
      </section>

      <aside class="workspace-panel" id="workspacePanel" hidden aria-live="polite">
        <button class="panel-close" type="button" data-action="close-workspace" title="关闭">×</button>
        <span class="panel-kicker">YUYU 工作台</span>
        <h2 id="workspaceTitle">出海短剧项目已创建</h2>
        <p id="workspaceCopy">选择模板或输入灵感后，系统会拆解角色、场景、分镜与视频生成任务。</p>
        <ol class="workflow-list">
          <li class="done"><span>1</span><strong>故事策划</strong><small>题材、受众和冲突线</small></li>
          <li><span>2</span><strong>角色资产</strong><small>主角、配角、服化道</small></li>
          <li><span>3</span><strong>分镜生成</strong><small>镜头脚本和节奏</small></li>
          <li><span>4</span><strong>视频成片</strong><small>Seedance 生成预览</small></li>
        </ol>
        <button class="primary-action" type="button" data-action="continue-workflow">进入画布</button>
      </aside>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </main>
    <script src="./src/app.js"></script>
  </body>
</html>
